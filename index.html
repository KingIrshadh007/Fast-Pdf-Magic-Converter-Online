<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Image to PDF Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
:root{
    --bg:#f3f4f6;
    --card:#fff;
    --text:#111;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:950px;
    background:var(--card);
    padding:20px;
    border-radius:15px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
    margin-top:15px;
}

.item img{
    width:100%;
    height:110px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
}

/* CONTROLS */
.controls{
    margin-top:15px;
    display:grid;
    gap:10px;
}

/* CROP MODAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:15px;
    border-radius:10px;
}

canvas{
    max-width:100%;
}

/* BAR */
.bar{
    width:100%;
    height:10px;
    background:#ddd;
    margin-top:10px;
}

.fill{
    height:10px;
    width:0%;
    background:green;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
    <h2>Image → PDF Pro</h2>
    <button onclick="toggleDark()">🌙</button>
</div>

<input type="file" id="input" multiple accept="image/*">

<div class="controls">

<select id="layout">
    <option value="1">1 per page</option>
    <option value="2">2 per page</option>
    <option value="4">4 per page</option>
</select>

<button onclick="generatePDF()">Convert PDF</button>

</div>

<div class="bar"><div class="fill" id="fill"></div></div>

<div class="grid" id="grid"></div>

</div>

<!-- CROP MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <canvas id="canvas"></canvas>
        <br>
        <button onclick="applyCrop()">Apply Crop</button>
        <button onclick="closeCrop()">Close</button>
    </div>
</div>

<script>

let files = [];
let croppedImage = null;
let currentIndex = null;

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* INPUT */
document.getElementById("input").onchange = e=>{
    files.push(...e.target.files);
    render();
};

/* RENDER */
function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML="";

    files.forEach((f,i)=>{
        const reader = new FileReader();

        reader.onload = e=>{
            const div = document.createElement("div");
            div.className="item";

            div.innerHTML = `
                <img src="${e.target.result}" onclick="openCrop(${i})">
            `;

            grid.appendChild(div);
        };

        reader.readAsDataURL(f);
    });
}

/* CROP */
function openCrop(index){
    currentIndex = index;

    const file = files[index];
    const reader = new FileReader();

    reader.onload = e=>{
        const img = new Image();
        img.onload = ()=>{

            const canvas = document.getElementById("canvas");
            canvas.width = 300;
            canvas.height = 300;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img,0,0,300,300);
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);

    document.getElementById("modal").style.display="flex";
}

function applyCrop(){
    document.getElementById("modal").style.display="none";
}

/* CLOSE */
function closeCrop(){
    document.getElementById("modal").style.display="none";
}

/* PDF */
async function generatePDF(){

    const pdf = await PDFLib.PDFDocument.create();

    const layout = Number(document.getElementById("layout").value);

    let pages = [];

    for(let i=0;i<files.length;i++){

        const bytes = await files[i].arrayBuffer();
        const img = await pdf.embedJpg(bytes);

        pages.push(img);

        document.getElementById("fill").style.width =
            ((i+1)/files.length)*100 + "%";
    }

    let index = 0;
    let pageNumber = 1;

    while(index < pages.length){

        const page = pdf.addPage([595,842]);

        if(layout === 1){

            drawImage(page, pages[index]);
            drawPageNumber(page, pageNumber++);
            index++;

        } else if(layout === 2){

            for(let i=0;i<2 && index<pages.length;i++){
                drawImage(page, pages[index], i);
                index++;
            }
            drawPageNumber(page, pageNumber++);

        } else if(layout === 4){

            for(let i=0;i<4 && index<pages.length;i++){
                drawImage(page, pages[index], i);
                index++;
            }
            drawPageNumber(page, pageNumber++);
        }
    }

    const bytes = await pdf.save();

    const blob = new Blob([bytes],{type:"application/pdf"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "output.pdf";
    a.click();

    URL.revokeObjectURL(url);
}

/* DRAW IMAGE */
function drawImage(page,img,i=0){

    const positions = [
        [0,400],
        [0,0],
        [300,400],
        [300,0]
    ];

    const pos = positions[i] || [0,0];

    const scale = 0.5;

    page.drawImage(img,{
        x:pos[0],
        y:pos[1],
        width:250,
        height:300
    });
}

/* PAGE NUMBER */
function drawPageNumber(page,num){
    page.drawText("Page " + num,{
        x:270,
        y:20,
        size:12
    });
}

</script>

</body>
</html>
