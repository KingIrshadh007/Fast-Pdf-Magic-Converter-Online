<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:750px;
    background:#fff;
    border-radius:16px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#111827;
    margin-bottom:20px;
}

.dropzone{
    border:2px dashed #2563eb;
    border-radius:12px;
    padding:35px;
    text-align:center;
    cursor:pointer;
    background:#eff6ff;
    transition:.3s;
}

.dropzone:hover{
    background:#dbeafe;
}

.dropzone.dragover{
    background:#bfdbfe;
}

.dropzone h3{
    color:#1d4ed8;
    margin-bottom:8px;
}

.dropzone p{
    color:#6b7280;
}

.note{
    margin-top:15px;
    padding:12px;
    background:#fff7ed;
    border:1px solid #fdba74;
    border-radius:8px;
    color:#9a3412;
    font-size:14px;
    line-height:1.5;
}

#fileCount{
    margin-top:15px;
    font-weight:bold;
    color:#374151;
}

#fileList{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.file-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    background:#f9fafb;
}

.file-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width:85%;
    color:#111827;
}

.remove-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:50%;
    background:#ef4444;
    color:#fff;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.remove-btn:hover{
    background:#dc2626;
}

.options{
    margin-top:20px;
}

.options label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#374151;
}

select{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:8px;
}

button.convert-btn{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

button.convert-btn:hover{
    background:#1d4ed8;
}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:#111827;
}

input[type=file]{
    display:none;
}

.empty{
    text-align:center;
    color:#6b7280;
    padding:15px;
}

@media(max-width:600px){

    .container{
        padding:20px;
    }

    .dropzone{
        padding:25px;
    }

    .file-name{
        max-width:70%;
    }
}
</style>

</head>
<body>

<div class="container">

<h1>Image → PDF Converter</h1>

<label class="dropzone" id="dropzone">
    <h3>Upload Images</h3>
    <p>Click or drag and drop images here</p>
</label>

<input
type="file"
id="images"
multiple
accept=".jpg,.jpeg,.png,.webp,.gif,.bmp,.avif,image/*"

>

<div class="note">
    <strong>Note:</strong>
    Currently supported formats:
    JPG, JPEG, PNG, WEBP, GIF, BMP and AVIF.
</div>

<div id="fileCount"></div>

<div id="fileList">
    <div class="empty">
        No files selected.
    </div>
</div>

<div class="options">
    <label for="pageSize">PDF Page Size</label>

```
<select id="pageSize">
    <option value="A4">A4</option>
    <option value="LETTER">Letter</option>
</select>
```

</div>

<button class="convert-btn" id="convertBtn">
    Convert & Download PDF
</button>

<div id="status"></div>

</div>

<script>

const input = document.getElementById("images");
const dropzone = document.getElementById("dropzone");
const fileList = document.getElementById("fileList");
const fileCount = document.getElementById("fileCount");
const status = document.getElementById("status");

let selectedFiles = [];

dropzone.addEventListener("click", () => {
    input.click();
});

dropzone.addEventListener("dragover", e => {
    e.preventDefault();
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", e => {

    e.preventDefault();

    dropzone.classList.remove("dragover");

    const files =
        Array.from(e.dataTransfer.files);

    selectedFiles =
        [...selectedFiles, ...files];

    renderFiles();
});

input.addEventListener("change", () => {

    const files =
        Array.from(input.files);

    selectedFiles =
        [...selectedFiles, ...files];

    renderFiles();

    input.value = "";
});

function renderFiles(){

    if(selectedFiles.length === 0){

        fileCount.innerHTML = "";

        fileList.innerHTML =
            '<div class="empty">No files selected.</div>';

        return;
    }

    fileCount.innerHTML =
        `${selectedFiles.length} file(s) selected`;

    fileList.innerHTML = "";

    selectedFiles.forEach((file,index)=>{

        const item =
            document.createElement("div");

        item.className = "file-item";

        item.innerHTML = `
            <span class="file-name">${file.name}</span>

            <button
                class="remove-btn"
                onclick="removeFile(${index})"
                title="Remove File"
            >
                ✕
            </button>
        `;

        fileList.appendChild(item);
    });
}

function removeFile(index){

    selectedFiles.splice(index,1);

    renderFiles();
}

async function resizeImage(file){

    return new Promise((resolve,reject)=>{

        const img = new Image();

        img.onload = () => {

            const canvas =
                document.createElement("canvas");

            const maxWidth = 1800;

            let width = img.width;
            let height = img.height;

            if(width > maxWidth){

                height =
                    height * (maxWidth / width);

                width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx =
                canvas.getContext("2d");

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(
                0,
                0,
                width,
                height
            );

            ctx.drawImage(
                img,
                0,
                0,
                width,
                height
            );

            canvas.toBlob(
                blob => resolve(blob),
                "image/jpeg",
                0.9
            );
        };

        img.onerror = reject;

        img.src =
            URL.createObjectURL(file);
    });
}

document
.getElementById("convertBtn")
.addEventListener("click", createPDF);

async function createPDF(){

    if(selectedFiles.length === 0){

        alert(
            "Please select at least one image."
        );

        return;
    }

    try{

        status.innerHTML =
            "Creating PDF...";

        const pdfDoc =
            await PDFLib.PDFDocument.create();

        const pageType =
            document.getElementById("pageSize")
            .value;

        let pageWidth;
        let pageHeight;

        if(pageType === "LETTER"){

            pageWidth = 612;
            pageHeight = 792;
        }
        else{

            pageWidth = 595;
            pageHeight = 842;
        }

        let count = 0;

        for(const file of selectedFiles){

            count++;

            status.innerHTML =
                `Processing ${count} of ${selectedFiles.length}`;

            const compressed =
                await resizeImage(file);

            const bytes =
                await compressed.arrayBuffer();

            const image =
                await pdfDoc.embedJpg(bytes);

            const page =
                pdfDoc.addPage([
                    pageWidth,
                    pageHeight
                ]);

            const margin = 20;

            const scale = Math.min(
                (pageWidth - margin * 2)
                    / image.width,
                (pageHeight - margin * 2)
                    / image.height
            );

            const imgWidth =
                image.width * scale;

            const imgHeight =
                image.height * scale;

            page.drawImage(image,{
                x:(pageWidth-imgWidth)/2,
                y:(pageHeight-imgHeight)/2,
                width:imgWidth,
                height:imgHeight
            });
        }

        const pdfBytes =
            await pdfDoc.save();

        const blob =
            new Blob(
                [pdfBytes],
                {
                    type:"application/pdf"
                }
            );

        const url =
            URL.createObjectURL(blob);

        const a =
            document.createElement("a");

        a.href = url;
        a.download = "images.pdf";

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        setTimeout(()=>{
            URL.revokeObjectURL(url);
        },3000);

        status.innerHTML =
            "PDF downloaded successfully.";
    }
    catch(error){

        console.error(error);

        status.innerHTML =
            "Error: " + error.message;

        alert(
            "Error: " + error.message
        );
    }
}

</script>

</body>
</html>
