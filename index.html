<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast-Magic-Pdf-Image-Converter-Online</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>

/* ===== BASE ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
    transition:0.3s;
}

/* ===== HEADER ===== */
.site-header{
    position:sticky;
    top:0;
    z-index:1000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:#2563eb;
}

.site-header nav{
    display:flex;
    gap:18px;
}

.site-header nav a{
    text-decoration:none;
    color:#374151;
}

/* ===== LAYOUT ===== */
.page-wrapper{
    min-height:calc(100vh - 140px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* TITLE */
h1{
    text-align:center;
    margin-bottom:30px;
}

/* ===== DROPZONE ===== */
.dropzone{
    min-height:180px;
    border:2px dashed #2563eb;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-radius:12px;
    background:#eff6ff;
    cursor:pointer;
    text-align:center;
    padding:20px;
}

.dropzone.dragover{
    background:#bfdbfe;
}

.formats{
    margin-top:10px;
    font-size:13px;
    color:#6b7280;
}

/* OPTIONS */
.options{
    margin-top:15px;
    margin-bottom:10px;
}

.options label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

.options select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

input[type="file"]{
    display:none;
}

#fileList{
    margin-top:15px;
}

.file-item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border:1px solid #ddd;
    margin-top:10px;
    border-radius:8px;
}

/* BUTTON */
.convert-btn{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* FOOTER */
.site-footer{
    margin-top:40px;
    padding:25px;
    background:#111827;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.footer-links{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.footer-links a{
    color:#ccc;
    text-decoration:none;
    font-size:14px;
}

.footer-links a:hover{
    color:white;
}

/* DARK MODE */
.dark-mode{
    background:#111827;
    color:white;
}

.dark-mode .container{
    background:#1f2937;
}

.dark-mode .site-header{
    background:#1f2937;
}

.dark-mode .site-header a{
    color:white;
}

.dark-mode .file-item{
    background:#374151;
    border-color:#4b5563;
}

.dark-mode .dropzone{
    background:#1e3a8a;
}

.dark-mode .formats{
    color:#cbd5e1;
}
/* =========================
   MOBILE RESPONSIVE FIX ONLY
========================= */

@media (max-width: 768px) {

    .site-header{
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 15px;
    }

    .site-header nav{
        flex-wrap: wrap;
        gap: 10px;
        width: 100%;
    }

    .site-header nav a{
        font-size: 14px;
    }

    .logo{
        font-size: 18px;
    }

    .container{
        padding: 20px;
        border-radius: 12px;
    }

    h1{
        font-size: 20px;
    }

    .dropzone{
        min-height: 140px;
        padding: 15px;
    }

    .file-item{
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }

    .convert-btn{
        font-size: 16px;
        padding: 12px;
    }

    .site-footer{
        flex-direction: column;
        text-align: center;
        gap: 10px;
    }

    .footer-links{
        justify-content: center;
        gap: 15px;
    }
}

@media (max-width: 420px) {

    .container{
        padding: 15px;
    }

    .site-header nav{
        justify-content: center;
    }
}
</style>
</head>

<body>

<header class="site-header">
    <div class="logo">⚡ Fast Magic PDF</div>

    <nav>
        <a href="#" onclick="showSection('home')">Home</a>
        <a href="#" onclick="showSection('tools')">Tools</a>
        <a href="#" onclick="showSection('features')">Features</a>
        <a href="#" onclick="showSection('contact')">Contact</a>
    </nav>

    <button id="themeToggle">🌙 Dark Mode</button>
</header>

<div class="page-wrapper">

<div class="container">

<!-- DYNAMIC CONTENT AREA -->
<div id="dynamicContent">

<h1>Image → PDF Converter</h1>

<div class="dropzone" id="dropzone">
    <h3>Upload Images</h3>
    <p>Click or drag & drop images here</p>

    <div class="formats">
        Supported: JPG, JPEG, PNG, WEBP, GIF, BMP, AVIF
    </div>
</div>

<input type="file" id="images" multiple accept=".jpg,.jpeg,.png,.webp,.gif,.bmp,.avif">

<div class="options">
    <label>PDF Page Size</label>
    <select id="pageSize">
        <option value="A4">A4 (Standard)</option>
        <option value="LETTER">Letter (US)</option>
        <option value="A3">A3 (Large)</option>
    </select>
</div>

<div id="fileList"></div>

<button class="convert-btn" id="convertBtn">
Convert & Download PDF
</button>

<div id="status"></div>

</div>

</div>

</div>

<footer class="site-footer">
    <div class="footer-links">
        <a href="#" onclick="showSection('privacy')">Privacy Policy</a>
        <a href="#" onclick="showSection('terms')">Terms</a>
        <a href="#" onclick="showSection('cookies')">Cookies</a>
        <a href="#" onclick="showSection('contact')">Contact</a>
    </div>

    <p>© 2026 Fast Magic PDF</p>
</footer>

<script>

const input=document.getElementById("images");
const dropzone=document.getElementById("dropzone");
const fileList=document.getElementById("fileList");
const pageSize=document.getElementById("pageSize");

let selectedFiles=[];

/* DARK MODE */
const themeToggle=document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark-mode");
    themeToggle.innerHTML="☀️ Light Mode";
}

themeToggle.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("theme","dark");
        themeToggle.innerHTML="☀️ Light Mode";
    }else{
        localStorage.setItem("theme","light");
        themeToggle.innerHTML="🌙 Dark Mode";
    }
});

/* HEADER + FOOTER PAGE SWITCH */
function showSection(section){

    const content=document.getElementById("dynamicContent");

    let html="";

    switch(section){

        case "home":
            location.reload();
            return;

        case "tools":
            html=`
                <h2>🧰 Tools</h2>
                <p>Image to PDF Converter (current)</p>
                <p>More tools coming soon like PDF merge and compression.</p>
            `;
            break;

        case "features":
            html=`
                <h2>⚡ Features</h2>
                <ul>
                    <li>Fast browser-based conversion</li>
                    <li>No file upload (fully secure)</li>
                    <li>High-quality PDF output</li>
                    <li>Mobile friendly design</li>
                </ul>
            `;
            break;

        case "contact":
            html=`
                <h2>📩 Contact</h2>
                <p>Email: support@fastmagicpdf.com</p>
            `;
            break;

        case "privacy":
            html=`
                <h2>🔒 Privacy Policy</h2>
                <p>Your files are processed locally and never uploaded.</p>
            `;
            break;

        case "terms":
            html=`
                <h2>📜 Terms</h2>
                <p>Use this tool responsibly. No misuse allowed.</p>
            `;
            break;

        case "cookies":
            html=`
                <h2>🍪 Cookies</h2>
                <p>We only use localStorage for theme settings.</p>
            `;
            break;
    }

    content.innerHTML=html;
}

/* CLICK UPLOAD */
dropzone.onclick=()=>input.click();

input.addEventListener("change",()=>{
    selectedFiles=[...selectedFiles,...input.files];
    renderFiles();
});

dropzone.addEventListener("dragover",(e)=>{
    e.preventDefault();
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave",()=>{
    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop",(e)=>{
    e.preventDefault();
    dropzone.classList.remove("dragover");

    const files=[...e.dataTransfer.files];
    const images=files.filter(f=>f.type.startsWith("image/"));

    selectedFiles=[...selectedFiles,...images];
    renderFiles();
});

function renderFiles(){

    fileList.innerHTML="";

    selectedFiles.forEach((file,i)=>{

        const div=document.createElement("div");
        div.className="file-item";

        div.innerHTML=`
        <span>${file.name}</span>
        <button onclick="removeFile(${i})">X</button>
        `;

        fileList.appendChild(div);
    });
}

function removeFile(i){
    selectedFiles.splice(i,1);
    renderFiles();
}

/* PDF CREATE (UNCHANGED LOGIC) */
document.getElementById("convertBtn")
.addEventListener("click",createPDF);

async function createPDF(){

    if(selectedFiles.length===0){
        alert("Select images first");
        return;
    }

    const pdfDoc=await PDFLib.PDFDocument.create();

    let pageWidth=595;
    let pageHeight=842;

    const size=pageSize.value;

    if(size==="LETTER"){
        pageWidth=612;
        pageHeight=792;
    }

    if(size==="A3"){
        pageWidth=842;
        pageHeight=1191;
    }

    for(const file of selectedFiles){

        const blob=await resizeImage(file);
        const bytes=await blob.arrayBuffer();

        const image=await pdfDoc.embedJpg(bytes);

        const page=pdfDoc.addPage([pageWidth,pageHeight]);

        const scale=Math.min(
            pageWidth/image.width,
            pageHeight/image.height
        );

        page.drawImage(image,{
            x:(pageWidth-image.width*scale)/2,
            y:(pageHeight-image.height*scale)/2,
            width:image.width*scale,
            height:image.height*scale
        });
    }

    const pages=pdfDoc.getPages();

    pages.forEach((p,i)=>{
        p.drawText(`Page ${i+1} of ${pages.length}`,{
            x:p.getWidth()/2-40,
            y:20,
            size:10
        });
    });

    const pdfBytes=await pdfDoc.save();

    const blob=new Blob([pdfBytes],{type:"application/pdf"});

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download="images.pdf";
    a.click();

    URL.revokeObjectURL(url);
}

/* RESIZE */
async function resizeImage(file){

    return new Promise(resolve=>{

        const img=new Image();

        img.onload=()=>{

            const canvas=document.createElement("canvas");

            let w=img.width;
            let h=img.height;

            if(w>1800){
                h*=1800/w;
                w=1800;
            }

            canvas.width=w;
            canvas.height=h;

            const ctx=canvas.getContext("2d");
            ctx.drawImage(img,0,0,w,h);

            canvas.toBlob(blob=>resolve(blob),"image/jpeg",0.9);
        };

        img.src=URL.createObjectURL(file);
    });
}

</script>

</body>
</html>
