<!DOCTYPE html>
<html>

<head>

<title>Compress PDF - Fast Magic PDF</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div class="container">


<h1>
📦 Compress PDF
</h1>


<div class="dropzone">


<h3>
Upload PDF
</h3>


<p>
Select your PDF file
</p>


</div>


<input 
type="file"
id="compressFile"
accept=".pdf">



<br><br>


<select id="quality">


<option value="high">
High Quality
</option>


<option value="medium">
Medium Quality
</option>


<option value="low">
Low Quality
</option>


</select>



<br><br>



<button 
onclick="compressPDF()">

Compress PDF

</button>



<div id="status"></div>


</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script src="../js/compressPdf.js"></script>


</body>

</html>
